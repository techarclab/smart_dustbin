name: smartbin_provisioner
description: SmartBin field provisioning app (Android)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^12.0.0          # phone GPS
  permission_handler: ^11.3.1  # runtime permissions
  wifi_iot: ^0.3.19            # connect to the bin's SoftAP + route traffic to it
  http: ^1.2.2                 # POST to the device

flutter:
  uses-material-design: true
